- name: "High rated (>5.4) with valid NFO"
  extensions: [".nfo"]
  search_expressions:
    - "rating:>5.4&nfostatus:!exists"
    - "rating:>5.4&nfostatus:"
    - "rating:>5.4&nfostatus:nfo file ok"

- name: "Low rated (<=5.4) with valid NFO"
  extensions: [".nfo"]
  search_expressions:
    - "rating:>0.1&rating:<=5.4&nfostatus:!exists"
    - "rating:>0.1&rating:<=5.4&nfostatus:"
    - "rating:>0.1&rating:<=5.4&nfostatus:nfo file ok"

- name: "Zero/no rating"
  extensions: [".nfo"]
  search_expressions:
    - "rating:0&nfostatus:!exists"
    - "ratings_status:no ratings found&nfostatus:!exists"
    - "rating:0&nfostatus:nfo file ok"
    - "ratings_status:no ratings found&nfostatus:nfo file ok"

- name: "Has any rating with valid NFO"
  extensions: [".nfo"]
  search_expressions:
    - "rating:>0&nfostatus:!exists"
    - "rating:>0&nfostatus:"
    - "rating:>0&nfostatus:nfo file ok"

- name: "Check NFO file issues"
  extensions: [".nfo"]
  search_expressions:
    - "nfostatus:Check nfo file*"

- name: "Empty plot in NFO"
  extensions: [".nfo"]
  search_expressions:
    - "nfostatus:*plot is empty*"

- name: "Correctly scraped (year match, perfect similarity)"
  extensions: [".nfo"]
  search_expressions:
    - "nfostatus:*Year difference=0)&plot_sim_score:1.0"

- name: "Rescrape candidates (year diff 1-3, high similarity)"
  extensions: [".nfo"]
  search_expressions:
    - "nfostatus:*Year difference=1)&plot_sim_score:>0.9"
    - "nfostatus:*Year difference=2)&plot_sim_score:>0.9"
    - "nfostatus:*Year difference=3)&plot_sim_score:>0.9"

- name: "Rescrape candidates (year diff 4-6, high similarity)"
  extensions: [".nfo"]
  search_expressions:
    - "nfostatus:*Year difference=4)&plot_sim_score:>0.9"
    - "nfostatus:*Year difference=5)&plot_sim_score:>0.9"
    - "nfostatus:*Year difference=6)&plot_sim_score:>0.9"

- name: "Rescrape candidates (year diff 4-6, medium similarity)"
  extensions: [".nfo"]
  search_expressions:
    - "nfostatus:*Year difference=4)&plot_sim_score:>0.5"
    - "nfostatus:*Year difference=5)&plot_sim_score:>0.5"
    - "nfostatus:*Year difference=6)&plot_sim_score:>0.5"

- name: "Any year difference"
  extensions: [".nfo"]
  search_expressions:
    - "nfostatus:*Year difference*"

- name: "Rescrape flagged files"
  extensions: [".txt"]
  search_expressions:
    - "Rescrape: True"

- name: "Documentary genre"
  extensions: [".nfo", ".txt"]
  search_expressions:
    - "genre:Dokumentarfilm"
    - "genre:Dokumentation"
    - "genre:Documentary"

- name: "Krimi/Crime genre"
  extensions: [".nfo", ".txt"]
  search_expressions:
    - "genre:Krimi"
    - "genre:Kriminalfilm"
    - "genre:Crime"
    - "Krimi"
    - "Kriminalfilm"

- name: "AC3 5.1 surround audio"
  extensions: [".log"]
  search_expressions:
    - "AC3 Audio 5.1"

- name: "Lost data files"
  extensions: [".log"]
  search_expressions:
    - ") Lost Data: "

- name: "No duration found"
  extensions: [".log"]
  search_expressions:
    - "No duration found with ffprobe!"

- name: "Recording overdue/cancelled"
  extensions: [".log"]
  search_expressions:
    - "program overdue - recording canceled"

- name: "Encoding exit code errors"
  extensions: [".log"]
  search_expressions:
    - "exit code not ok"

- name: "AV1 QSV encoded"
  extensions: [".log"]
  search_expressions:
    - "-c:v av1_qsv -preset veryslow"

- name: "Durations inconsistent"
  extensions: [".log"]
  search_expressions:
    - "Durations inconsistent"
